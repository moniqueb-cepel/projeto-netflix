<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Escolha um perfil</h1>
        <section class="profiles">
            <nav class="profile">
                <a href="#">
                    <figure>
                        <img src="/assets/perfil-1.jpg" alt="Perfil Masculino">
                        <figcaption>João</figcaption>
                    </figure>
                </a>
            </nav>
            <nav class="profile">
                <a href="#">
                    <figure>
                        <img src="/assets/perfil-2.jpg" alt="Perfil Masculino">
                        <figcaption>Paulo</figcaption>
                    </figure>
                </a>
            </nav>
            <nav class="profile">
                <a href="#">
                    <figure>
                        <img src="/assets/perfil-3.jpg" alt="Perfil Infantil">
                        <figcaption>Daniel</figcaption>
                    </figure>
                </a>
            </nav>
            <nav class="profile">
                <a href="#">
                    <figure>
                        <img src="/assets/perfil-4.jpg" alt="Perfil Feminino">
                        <figcaption>Júlia</figcaption>
                    </figure>
                </a>
            </nav>

        </section>

    </main>


</body>
</html>
